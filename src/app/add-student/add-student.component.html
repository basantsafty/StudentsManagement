
<div class="container mt-5 mx-auto .d-flex flex-column align-items-center">
  <h1 class="text-center">Add Student</h1>
  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()" class="w-75 mx-auto d-flex flex-column align-items-center">

    <!-- ID -->
    <div class="mb-3 w-50">
      <label for="id" class="form-label">ID</label>
      <input type="number" class="form-control" id="id" formControlName="id">
    </div>

    <!-- First Name -->
    <div class="mb-3 w-50">
      <label for="firstName" class="form-label">First Name</label>
      <input type="text" class="form-control" id="firstName" formControlName="firstName">
    </div>

    <!-- Last Name -->
    <div class="mb-3 w-50">
      <label for="lastName" class="form-label">Last Name</label>
      <input type="text" class="form-control" id="lastName" formControlName="lastName">
    </div>

    <!-- Age -->
    <div class="mb-3 w-50">
      <label for="age" class="form-label">Age</label>
      <input type="number" class="form-control" id="age" formControlName="age">
    </div>

    <!-- Gender -->
    <div class="mb-3 w-50">
      <label for="gender" class="form-label">Gender</label>
      <select class="form-select" id="gender" formControlName="gender">
        <option selected disabled>Choose...</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>
    </div>

    <!-- Email -->
    <div class="mb-3 w-50">
      <label for="email" class="form-label">Email address</label>
      <input type="email" class="form-control" id="email" formControlName="email">
    </div>

    <!-- Phone -->
    <div class="mb-3 w-50">
      <label for="phone" class="form-label">Phone</label>
      <input type="tel" class="form-control" id="phone" formControlName="phone">
    </div>

    <!-- Address -->
    <div class="mb-3 w-50">
      <label for="address" class="form-label">Address</label>
      <input type="text" class="form-control" id="address" formControlName="address">
    </div>

    <!-- City -->
    <div class="mb-3 w-50">
      <label for="city" class="form-label">City</label>
      <input type="text" class="form-control" id="city" formControlName="city">
    </div>

    <!-- Country -->
    <div class="mb-3 w-50">
      <label for="country" class="form-label">Country</label>
      <input type="text" class="form-control" id="country" formControlName="country">
    </div>

    <!-- Department -->
    <div class="mb-3 w-50">
      <label for="department" class="form-label">Department</label>
      <input type="text" class="form-control" id="department" formControlName="department">
    </div>

    <!-- Level -->
    <div class="mb-3 w-50">
      <label for="level" class="form-label">Level</label>
      <input type="text" class="form-control" id="level" formControlName="level">
    </div>

    <!-- GPA -->
    <div class="mb-3 w-50">
      <label for="gpa" class="form-label">GPA</label>
      <input type="number" step="0.01" class="form-control" id="gpa" formControlName="GPA">
    </div>

    <!-- Enrollment Date -->
    <div class="mb-3 w-50">
      <label for="enrollmentDate" class="form-label">Enrollment Date</label>
      <input type="date" class="form-control" id="enrollmentDate" formControlName="enrollmentDate">
    </div>

    <!-- Active Status -->
    <div class="mb-3 w-50 form-check  d-flex align-items-center">
      <input type="checkbox" class="form-check-input" id="isActive" formControlName="isActive">
      <label class="form-check-label" for="isActive">Active</label>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>
